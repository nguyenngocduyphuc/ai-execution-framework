name: AXF CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Run Environment Verification
      run: python verification/verify_environment.py
      
    - name: Run Example Verifiers
      run: |
        python examples/wordpress_seo/verify_example.py
        python examples/python_app_factory/verify_example.py
        
    - name: Compile Check
      run: |
        python -m py_compile verification/verify_environment.py
        python -m py_compile examples/wordpress_seo/verify_example.py
        python -m py_compile examples/python_app_factory/verify_example.py
